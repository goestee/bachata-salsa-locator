name: Update DFW Dance Events

on:
  # Twice daily: 13:00 UTC (~ 8 AM Central) and 01:00 UTC (~ 8 PM Central).
  # Cron is in UTC; see https://crontab.guru/.
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"
  # Manual trigger button in the Actions tab.
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated source names (blank = all enabled)"
        required: false
        default: ""

permissions:
  contents: write   # allow the bot to commit EVENTS.md back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run aggregator
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python -m src.main --only="${{ github.event.inputs.only }}"
          else
            python -m src.main
          fi

      - name: Commit changes
        run: |
          git config user.name  "dfw-dance-bot"
          git config user.email "dfw-dance-bot@users.noreply.github.com"
          git add EVENTS.md index.html data/events.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(events): refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
